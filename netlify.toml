# Netlify-Build-Konfiguration für das statische Astro-Projekt.
# Source = dieses GitHub-Repo. Netlify baut bei jedem Push auf main neu.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Astro 6 verlangt Node >= 22.12.0; fest gepinnt statt nur "22".
  NODE_VERSION = "22.12.0"
